spring:
  application:
    name: art_platform
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:${DB_CONTAINER_PORT:3306}/art_platform?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
  jpa:
    defer-datasource-initialization: true
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:${KEYCLOAK_LOCAL_PORT:8180}/realms/art-platform}

keycloak:
    server-url: ${KEYCLOAK_SERVER_URL:http://localhost:${KEYCLOAK_LOCAL_PORT:8180}}
    realm: art-platform
    admin-username: ${KEYCLOAK_ADMIN_USERNAME}
    admin-password: ${KEYCLOAK_ADMIN_PASSWORD}

kind: Application