spring:
  application:
    name: art_platform
  datasource:
    url: jdbc:mysql://localhost:3306/art_platform?createDatabaseIfNotExist=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
  jpa:
    defer-datasource-initialization: true
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/art-platform #lo configurerò poi con https in production
#  In production quando avrà un certificato sul server aggiungerò le direttive SSL
#  server:
#    ssl:
#      enabled: true
#      key-store: classpath:keystore.p12
#      key-store-password: ${SSL_PASSWORD}
#      key-store-type: PKCS12

keycloak:
  server-url: http://localhost:8180
  realm: art-platform
  admin-username: ${KEYCLOAK_ADMIN_USERNAME}
  admin-password: ${KEYCLOAK_ADMIN_PASSWORD}