version: '3.8'

services:
  db:
    image: ${DB_IMAGE}
    container_name: app_database
    restart: always
    environment:
      MYSQL_DATABASE: art_platform
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "${DB_LOCAL_PORT}:${DB_CONTAINER_PORT}"
    volumes:
      - db_data:/var/lib/mysql

  keycloak:
    image: ${KEYCLOAK_IMAGE}
    container_name: app_keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USERNAME}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "${KEYCLOAK_LOCAL_PORT}:8080"
    depends_on:
      - db
    volumes:
      - keycloak_data:/opt/keycloak/data

  backend:
    build: .
    container_name: app_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:${DB_CONTAINER_PORT:-3306}/art_platform?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - KEYCLOAK_ADMIN_USERNAME=${KEYCLOAK_ADMIN_USERNAME}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KEYCLOAK_SERVER_URL=http://keycloak:8080
      - KEYCLOAK_ISSUER_URI=http://keycloak:8080/realms/art-platform
    depends_on:
      - db
      - keycloak
    volumes:
      - /home/frank2/immaginiprogetto:/app/immagini

volumes:
  db_data:
  keycloak_data: